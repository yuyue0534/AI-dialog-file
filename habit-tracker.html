<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Critter 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF9F0;
    --card: #FFFFFF;
    --accent1: #FF6B6B;
    --accent2: #FFD93D;
    --accent3: #6BCB77;
    --accent4: #4D96FF;
    --accent5: #C77DFF;
    --text: #2D2D2D;
    --muted: #999;
    --shadow: 4px 4px 0px #2D2D2D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(circle at 20% 20%, #FFE0E0 0%, transparent 40%),
                      radial-gradient(circle at 80% 80%, #E0F0FF 0%, transparent 40%),
                      radial-gradient(circle at 50% 50%, #E8FFE8 0%, transparent 60%);
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--text);
    letter-spacing: 1px;
    position: relative;
    display: inline-block;
  }

  header h1 span {
    color: var(--accent1);
  }

  .tagline {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-weight: 600;
  }

  .streak-bar {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: 1rem auto;
    flex-wrap: wrap;
  }

  .streak-pill {
    background: var(--accent2);
    border: 2.5px solid var(--text);
    border-radius: 50px;
    padding: 0.4rem 1.2rem;
    font-weight: 800;
    font-size: 0.95rem;
    box-shadow: 3px 3px 0 var(--text);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 1rem 1.2rem 3rem;
  }

  .add-habit-form {
    background: white;
    border: 2.5px solid var(--text);
    border-radius: 16px;
    padding: 1.2rem;
    box-shadow: var(--shadow);
    margin-bottom: 2rem;
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .add-habit-form input {
    flex: 1 1 180px;
    border: 2px solid var(--text);
    border-radius: 10px;
    padding: 0.55rem 1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    background: var(--bg);
    transition: box-shadow 0.15s;
  }

  .add-habit-form input:focus {
    box-shadow: 3px 3px 0 var(--accent4);
  }

  .emoji-picker {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .emoji-btn {
    width: 38px; height: 38px;
    border: 2px solid transparent;
    border-radius: 10px;
    background: var(--bg);
    font-size: 1.3rem;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .emoji-btn:hover { transform: scale(1.2); }
  .emoji-btn.selected {
    border-color: var(--text);
    background: var(--accent2);
    transform: scale(1.1);
  }

  .add-btn {
    background: var(--accent1);
    color: white;
    border: 2.5px solid var(--text);
    border-radius: 10px;
    padding: 0.55rem 1.4rem;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--text);
    transition: transform 0.1s, box-shadow 0.1s;
    white-space: nowrap;
  }

  .add-btn:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--text); }
  .add-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--text); }

  .section-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .habits-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .habit-card {
    background: white;
    border: 2.5px solid var(--text);
    border-radius: 16px;
    padding: 1rem 1.2rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .habit-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: var(--card-color, var(--accent3));
    border-radius: 16px 0 0 16px;
  }

  .habit-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--text); }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .habit-emoji {
    font-size: 2rem;
    flex-shrink: 0;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    border-radius: 12px;
    border: 2px solid #E5E5E5;
  }

  .habit-info {
    flex: 1;
    min-width: 0;
  }

  .habit-name {
    font-weight: 800;
    font-size: 1.05rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .habit-meta {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 600;
    margin-top: 0.1rem;
  }

  .week-dots {
    display: flex;
    gap: 5px;
    margin-top: 0.5rem;
  }

  .dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #DDD;
    background: #F5F5F5;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    font-weight: 800;
    color: #CCC;
    flex-shrink: 0;
  }

  .dot.done {
    background: var(--card-color, var(--accent3));
    border-color: var(--text);
    color: white;
    transform: scale(1.1);
  }

  .dot:hover { transform: scale(1.2); }

  .check-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2.5px solid var(--text);
    background: var(--bg);
    font-size: 1.3rem;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    box-shadow: 2px 2px 0 var(--text);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .check-btn:hover { transform: scale(1.1); }
  .check-btn.checked {
    background: var(--accent3);
    animation: bounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes bounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .delete-btn {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: 2px solid #DDD;
    background: white;
    font-size: 1rem;
    cursor: pointer;
    color: #CCC;
    transition: color 0.15s, border-color 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .delete-btn:hover { color: var(--accent1); border-color: var(--accent1); }

  .confetti-burst {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    top: 0; left: 0; width: 100%; height: 100%;
  }

  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall 0.8s ease-out forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(720deg) scale(0.3); }
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .empty-state .big-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 1rem;
    animation: wobble 2s infinite;
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  .empty-state p { font-weight: 700; font-size: 1.1rem; }

  .progress-wrap {
    margin-top: 0.4rem;
  }

  .progress-track {
    height: 7px;
    background: #EEE;
    border-radius: 99px;
    overflow: hidden;
    border: 1.5px solid #DDD;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--card-color, var(--accent3));
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
</style>
</head>
<body>

<header>
  <h1>Habit <span>Critter</span> 🐾</h1>
  <div class="tagline">Small habits. Big adventures. One day at a time!</div>
  <div class="streak-bar">
    <div class="streak-pill">🔥 <span id="total-streak">0</span> day streak</div>
    <div class="streak-pill">✅ <span id="today-count">0</span>/<span id="total-count">0</span> done today</div>
  </div>
</header>

<div class="container">
  <div class="add-habit-form">
    <div class="emoji-picker" id="emojiPicker"></div>
    <input type="text" id="habitInput" placeholder="New habit name..." maxlength="40" />
    <button class="add-btn" onclick="addHabit()">+ Add!</button>
  </div>

  <div class="section-label">📋 Your Habits</div>
  <div class="habits-grid" id="habitsGrid">
    <div class="empty-state" id="emptyState">
      <span class="big-emoji">🥚</span>
      <p>Your critter is waiting to hatch!<br>Add your first habit above.</p>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['🏃','💧','📚','🧘','🥗','😴','💪','🎨','✍️','🎵'];
const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#C77DFF','#FF9A3C','#00C9A7','#FF6EC7'];
const DAYS = ['M','T','W','T','F','S','S'];

let selectedEmoji = EMOJIS[0];
let habits = JSON.parse(localStorage.getItem('habitCritter') || '[]');

// Init emoji picker
const picker = document.getElementById('emojiPicker');
EMOJIS.forEach((e, i) => {
  const btn = document.createElement('button');
  btn.className = 'emoji-btn' + (i===0?' selected':'');
  btn.textContent = e;
  btn.onclick = () => {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedEmoji = e;
  };
  picker.appendChild(btn);
});

function getWeekKey() {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  return monday.toISOString().slice(0,10);
}

function getTodayIdx() {
  return (new Date().getDay() + 6) % 7; // Mon=0
}

function save() {
  localStorage.setItem('habitCritter', JSON.stringify(habits));
}

function addHabit() {
  const input = document.getElementById('habitInput');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  const habit = {
    id: Date.now(),
    name,
    emoji: selectedEmoji,
    color: COLORS[habits.length % COLORS.length],
    weekKey: getWeekKey(),
    checked: Array(7).fill(false),
    streak: 0
  };
  habits.push(habit);
  input.value = '';
  save();
  render();
}

function toggleDay(id, dayIdx) {
  const h = habits.find(h => h.id === id);
  if (!h) return;
  const wk = getWeekKey();
  if (h.weekKey !== wk) { h.weekKey = wk; h.checked = Array(7).fill(false); }
  h.checked[dayIdx] = !h.checked[dayIdx];
  if (dayIdx === getTodayIdx() && h.checked[dayIdx]) {
    burst(event);
  }
  // recalc streak
  h.streak = h.checked.filter(Boolean).length;
  save();
  render();
}

function deleteHabit(id) {
  habits = habits.filter(h => h.id !== id);
  save();
  render();
}

function burst(e) {
  const el = document.createElement('div');
  el.className = 'confetti-burst';
  document.body.appendChild(el);
  const cx = e ? e.clientX : window.innerWidth/2;
  const cy = e ? e.clientY : window.innerHeight/2;
  for (let i=0; i<18; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const angle = (i/18)*360;
    const dist = 60 + Math.random()*60;
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${COLORS[i%COLORS.length]};--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${Math.sin(angle*Math.PI/180)*dist}px;animation-delay:${Math.random()*0.1}s`;
    el.appendChild(p);
  }
  setTimeout(() => el.remove(), 1000);
}

function render() {
  const grid = document.getElementById('habitsGrid');
  const empty = document.getElementById('emptyState');
  const todayIdx = getTodayIdx();
  const wk = getWeekKey();

  // Sync week
  habits.forEach(h => {
    if (h.weekKey !== wk) { h.weekKey = wk; h.checked = Array(7).fill(false); h.streak = 0; }
  });

  if (habits.length === 0) {
    empty.style.display = 'block';
    // Remove all cards
    grid.querySelectorAll('.habit-card').forEach(c=>c.remove());
    updateHeader();
    return;
  }
  empty.style.display = 'none';

  // Rebuild
  const existing = {};
  grid.querySelectorAll('.habit-card').forEach(c => existing[c.dataset.id] = c);
  const newOrder = [];

  habits.forEach(h => {
    let card = existing[h.id];
    if (!card) {
      card = document.createElement('div');
      card.className = 'habit-card';
      card.dataset.id = h.id;
    }
    card.style.setProperty('--card-color', h.color);
    const doneToday = h.checked[todayIdx];
    const pct = Math.round((h.checked.filter(Boolean).length / 7) * 100);
    card.innerHTML = `
      <div class="habit-emoji">${h.emoji}</div>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        <div class="week-dots">
          ${DAYS.map((d,i) => `<div class="dot${h.checked[i]?' done':''}" onclick="toggleDay(${h.id},${i})" title="${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i]}">${d}</div>`).join('')}
        </div>
        <div class="progress-wrap">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="habit-meta">${h.checked.filter(Boolean).length}/7 this week · ${pct}%</div>
      </div>
      <button class="check-btn${doneToday?' checked':''}" onclick="toggleDay(${h.id},${todayIdx})" title="Toggle today">${doneToday?'✓':'○'}</button>
      <button class="delete-btn" onclick="deleteHabit(${h.id})" title="Delete">✕</button>
    `;
    newOrder.push(card);
  });

  // Reorder DOM
  newOrder.forEach(c => grid.appendChild(c));
  Object.values(existing).forEach(c => { if (!newOrder.includes(c)) c.remove(); });

  updateHeader();
}

function updateHeader() {
  const todayIdx = getTodayIdx();
  const doneToday = habits.filter(h => h.checked[todayIdx]).length;
  document.getElementById('today-count').textContent = doneToday;
  document.getElementById('total-count').textContent = habits.length;
  const allDone = habits.length > 0 && doneToday === habits.length;
  const streakDays = allDone ? 1 : 0; // simplified
  document.getElementById('total-streak').textContent = doneToday;
}

document.getElementById('habitInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHabit();
});

render();
</script>
</body>
</html>
